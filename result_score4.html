<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Result</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #ecfeff; color: #111827; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 3rem 2.5rem; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { font-size: 2rem; margin-bottom: 1rem; color: #0f766e; }
        p { font-size: 1.25rem; margin-bottom: 2.5rem; color: #374151; }
        .emoji { font-size: 5rem; margin-bottom: 1rem; animation: bounce 2s infinite; }
        a.btn { display: inline-block; padding: 1rem 2rem; background-color: #0d9488; color: white; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 1.1rem; transition: all 0.2s; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        a.btn:hover { background-color: #0f766e; transform: translateY(-2px); }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-20px);} 60% {transform: translateY(-10px);} }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji">👍</div>
        <h1>Quiz Complete!</h1>
        <p>You scored <strong>4</strong> out of <strong>5</strong></p>
        <a href="index.html" class="btn">Play Again</a>
    </div>
</body>
</html>
